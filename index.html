<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mosaic Blocks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="appShell" class="app-shell" data-view="play">
      <nav class="view-switch" aria-label="화면 선택">
        <button class="view-button is-active" type="button" data-view-button="play" aria-pressed="true">Player</button>
        <button class="view-button" type="button" data-view-button="maker" aria-pressed="false">Maker</button>
      </nav>

      <section class="play-area" aria-label="게임">
        <header class="topbar">
          <div>
            <p class="eyebrow">Mosaic Blocks</p>
            <h1>블록 캔버스</h1>
          </div>
          <div class="score-strip" aria-label="점수판">
            <div class="score-box">
              <span>점수</span>
              <strong id="score">0</strong>
            </div>
            <div class="score-box">
              <span>최고</span>
              <strong id="bestScore">0</strong>
            </div>
            <div class="score-box">
              <span>콤보</span>
              <strong id="combo">0</strong>
            </div>
          </div>
        </header>

        <div class="game-layout">
          <div class="board-wrap">
            <div id="board" class="board" aria-label="8 x 8 보드"></div>
            <div id="feedbackLayer" class="feedback-layer" aria-live="polite"></div>
            <div id="gameMessage" class="game-message" hidden>
              <strong>게임 종료</strong>
              <button id="restartFromOverlay" type="button">다시 시작</button>
            </div>
          </div>

          <aside class="tray-panel" aria-label="블록 후보">
            <div class="tray-head">
              <h2>블록 후보</h2>
              <button id="newGame" class="icon-button" type="button" title="새 게임" aria-label="새 게임">
                ↻
              </button>
            </div>
            <div id="pieceTray" class="piece-tray"></div>
            <div class="status-line">
              <span id="statusText">3개 중 하나를 고르세요</span>
            </div>
          </aside>
        </div>
      </section>

      <section class="workshop" aria-label="스킨 메이커" data-active-tool="draw" data-active-fill-mode="single">
        <section id="themeStartPanel" class="theme-start-panel" aria-label="테마 시작" hidden>
          <button id="newTheme" class="primary-button theme-new-button" type="button">새로운 테마 생성</button>
          <div id="themeLibraryList" class="theme-library-list" aria-label="저장된 테마"></div>
        </section>

        <section class="selection-panel" aria-label="선택지">
          <div class="maker-topbar">
            <label class="grid-select-label">
              <span>Grid</span>
              <select id="gridSelect" aria-label="패턴 격자 크기">
                <option value="1">1x1</option>
                <option value="2">2x2</option>
                <option value="3" selected>3x3</option>
                <option value="4">4x4</option>
                <option value="5">5x5</option>
              </select>
            </label>
            <div class="fill-mode-switch" role="group" aria-label="채우기 방식">
              <button class="fill-mode-button is-active" type="button" data-fill-mode="single" aria-pressed="true">단일</button>
              <button class="fill-mode-button" type="button" data-fill-mode="pattern" aria-pressed="false">패턴</button>
            </div>
          </div>

          <div class="tool-row mode-row" role="group" aria-label="스킨 도구">
            <button class="mode-button is-active" type="button" data-tool="draw">그리기</button>
            <button class="mode-button" type="button" data-tool="dot">도트</button>
            <button class="mode-button" type="button" data-tool="template">템플릿</button>
            <button class="mode-button" type="button" data-tool="image">이미지</button>
            <button class="mode-button" type="button" data-tool="erase">지우개</button>
          </div>
          <div id="makerNotice" class="maker-notice" aria-live="polite" hidden></div>
        </section>

        <section class="block-design-panel" aria-label="블록 디자인">
          <div class="compact-head">
            <span>블록 디자인</span>
            <div class="head-actions">
              <button id="commitDesign" class="primary-button" type="button">적용</button>
            </div>
          </div>

          <div class="tool-surface">
            <div class="dot-panel tool-panel" aria-label="도트 도구">
              <label class="vertical-zoom dot-zoom-control">
                <span>Zoom</span>
                <input id="dotZoom" type="range" min="0.8" max="4.8" step="0.1" value="1.2" aria-label="도트 줌" />
              </label>
              <div id="dotEditorWrap" class="dot-editor-wrap" aria-label="도트 찍기 작업 영역">
                <div id="dotEditor" class="dot-editor"></div>
              </div>
              <div class="tool-control-stack dot-control-stack">
                <details class="inline-picker dot-grid-picker">
                  <summary>
                    <span>도트</span>
                    <strong id="dotGridValue">12x12</strong>
                  </summary>
                  <div class="option-grid dot-grid-options" aria-label="도트 단위">
                    <button class="option-button" type="button" data-dot-grid="8">8x8</button>
                    <button class="option-button" type="button" data-dot-grid="10">10x10</button>
                    <button class="option-button is-active" type="button" data-dot-grid="12">12x12</button>
                    <button class="option-button" type="button" data-dot-grid="16">16x16</button>
                    <button class="option-button" type="button" data-dot-grid="20">20x20</button>
                    <button class="option-button" type="button" data-dot-grid="24">24x24</button>
                  </div>
                </details>
                <details class="inline-picker dot-color-picker">
                  <summary>
                    <span>색</span>
                    <span id="dotColorChip" class="picker-chip color-chip" style="--chip: #ff6b6b"></span>
                  </summary>
                  <div class="foldout-swatches" aria-label="도트 색상">
                    <button class="swatch is-active" type="button" data-color="#ff6b6b" style="--swatch: #ff6b6b" aria-label="코럴"></button>
                    <button class="swatch" type="button" data-color="#2ec4b6" style="--swatch: #2ec4b6" aria-label="민트"></button>
                    <button class="swatch" type="button" data-color="#ffca3a" style="--swatch: #ffca3a" aria-label="옐로"></button>
                    <button class="swatch" type="button" data-color="#6a4c93" style="--swatch: #6a4c93" aria-label="바이올렛"></button>
                    <button class="swatch" type="button" data-color="#3a86ff" style="--swatch: #3a86ff" aria-label="블루"></button>
                    <button class="swatch" type="button" data-color="#1f2933" style="--swatch: #1f2933" aria-label="차콜"></button>
                    <label class="color-input" title="사용자 색상">
                      <input id="dotColorPicker" type="color" value="#ff6b6b" aria-label="도트 사용자 색상" />
                    </label>
                  </div>
                </details>
                <details class="inline-picker dot-type-picker">
                  <summary>
                    <span>타입</span>
                    <strong id="dotTypeValue">점</strong>
                  </summary>
                  <div class="option-grid dot-type-options" aria-label="도트 종류">
                    <button class="option-button is-active" type="button" data-dot-type="single">점</button>
                    <button class="option-button" type="button" data-dot-type="cross">십자</button>
                    <button class="option-button" type="button" data-dot-type="square">사각</button>
                    <button class="option-button" type="button" data-dot-type="diamond">다이아</button>
                    <button class="option-button" type="button" data-dot-type="checker">체커</button>
                  </div>
                </details>
              </div>
            </div>

            <div class="draw-panel tool-panel" aria-label="드로잉 도구">
              <label class="vertical-zoom draw-zoom-control">
                <span>Zoom</span>
                <input id="drawZoom" type="range" min="1" max="3.6" step="0.1" value="1" aria-label="드로잉 줌" />
              </label>
              <div class="draw-canvas-stage">
                <canvas id="drawCanvas" width="220" height="220" aria-label="드로잉 캔버스"></canvas>
              </div>
              <div class="tool-control-stack draw-control-stack">
                <label class="brush-control">
                  브러시
                  <input id="brushSize" type="range" min="2" max="28" value="9" />
                </label>
                <details class="inline-picker draw-color-picker">
                  <summary>
                    <span>색</span>
                    <span id="drawColorChip" class="picker-chip color-chip" style="--chip: #ff6b6b"></span>
                  </summary>
                  <div class="foldout-swatches" aria-label="그리기 색상">
                    <button class="swatch is-active" type="button" data-color="#ff6b6b" style="--swatch: #ff6b6b" aria-label="코럴"></button>
                    <button class="swatch" type="button" data-color="#2ec4b6" style="--swatch: #2ec4b6" aria-label="민트"></button>
                    <button class="swatch" type="button" data-color="#ffca3a" style="--swatch: #ffca3a" aria-label="옐로"></button>
                    <button class="swatch" type="button" data-color="#6a4c93" style="--swatch: #6a4c93" aria-label="바이올렛"></button>
                    <button class="swatch" type="button" data-color="#3a86ff" style="--swatch: #3a86ff" aria-label="블루"></button>
                    <button class="swatch" type="button" data-color="#1f2933" style="--swatch: #1f2933" aria-label="차콜"></button>
                    <label class="color-input" title="사용자 색상">
                      <input id="colorPicker" type="color" value="#ff6b6b" aria-label="사용자 색상" />
                    </label>
                  </div>
                </details>
                <details class="inline-picker draw-shape-picker">
                  <summary>
                    <span>도형</span>
                    <strong id="drawShapeValue">펜</strong>
                  </summary>
                  <div class="shape-row" aria-label="도형 선택">
                    <button class="shape-button is-active" type="button" data-draw-shape="free">펜</button>
                    <button class="shape-button" type="button" data-draw-shape="rect">□</button>
                    <button class="shape-button" type="button" data-draw-shape="circle">○</button>
                    <button class="shape-button" type="button" data-draw-shape="line">／</button>
                    <button class="shape-button" type="button" data-draw-shape="triangle">△</button>
                  </div>
                </details>
                <label class="shape-size-control compact-control">
                  도형
                  <input id="shapeSize" type="range" min="24" max="180" value="92" />
                </label>
                <details class="inline-picker outline-control outline-picker">
                  <summary>
                    <span>외곽선</span>
                    <strong id="outlineWidthValue">보통</strong>
                  </summary>
                  <div class="option-grid outline-options" aria-label="외곽선 두께">
                    <button class="option-button" type="button" data-outline-width="2">얇게</button>
                    <button class="option-button is-active" type="button" data-outline-width="5">보통</button>
                    <button class="option-button" type="button" data-outline-width="9">두껍게</button>
                    <button class="option-button" type="button" data-outline-width="14">굵게</button>
                  </div>
                </details>
              </div>
            </div>

            <div class="template-panel tool-panel" aria-label="템플릿">
              <label class="vertical-zoom template-zoom-control">
                <span>Zoom</span>
                <input id="templateZoom" type="range" min="0.7" max="3.2" step="0.1" value="1" aria-label="템플릿 줌" />
              </label>
              <button id="templateFrame" class="template-frame" type="button" aria-label="템플릿 미리보기"></button>
              <div class="tool-control-stack template-control-stack">
              <details class="template-picker template-list-picker">
                <summary>
                  <span>템플릿</span>
                  <strong id="templateNameValue">네온</strong>
                </summary>
                <div class="template-option-grid">
                  <button class="texture-button texture-neon is-active" type="button" data-texture="neon">네온</button>
                  <button class="texture-button texture-candy" type="button" data-texture="candy">캔디</button>
                  <button class="texture-button texture-stone" type="button" data-texture="stone">스톤</button>
                  <button class="texture-button texture-stripe" type="button" data-texture="stripe">스트라이프</button>
                  <button class="texture-button texture-dot" type="button" data-texture="dotPop">도트팝</button>
                  <button class="texture-button texture-glass" type="button" data-texture="glass">글래스</button>
                  <button class="texture-button texture-carbon" type="button" data-texture="carbon">카본</button>
                  <button class="texture-button texture-wave" type="button" data-texture="wave">웨이브</button>
                </div>
              </details>
                <details class="template-picker template-color-picker">
                  <summary>
                    <span>컬러</span>
                    <span id="templateColorValue" class="template-color-summary" aria-label="템플릿 컬러 요약">
                      <span style="--chip: #28d7ff"></span>
                      <span style="--chip: #8b5cf6"></span>
                      <span style="--chip: #ff4ecd"></span>
                      <span style="--chip: #ffffff"></span>
                    </span>
                  </summary>
                  <div class="template-color-grid" aria-label="템플릿 색상">
                    <label style="--chip: #28d7ff">1<input id="templateColor1" type="color" value="#28d7ff" /></label>
                    <label style="--chip: #8b5cf6">2<input id="templateColor2" type="color" value="#8b5cf6" /></label>
                    <label style="--chip: #ff4ecd">3<input id="templateColor3" type="color" value="#ff4ecd" /></label>
                    <label style="--chip: #ffffff">4<input id="templateColor4" type="color" value="#ffffff" /></label>
                  </div>
                </details>
                <details class="template-picker template-tuning-picker">
                  <summary>
                    <span>세부</span>
                    <strong id="templateTuningValue">중간</strong>
                  </summary>
                  <div class="template-tuning-panel">
                    <label class="compact-control">
                      <span>강도</span>
                      <input id="templateIntensity" type="range" min="0.35" max="1" step="0.05" value="0.72" />
                    </label>
                    <label class="compact-control">
                      <span>밀도</span>
                      <input id="templateScale" type="range" min="0.7" max="3.2" step="0.1" value="1" />
                    </label>
                  </div>
                </details>
              </div>
            </div>

            <div class="photo-tools tool-panel">
              <label class="vertical-zoom image-scale-control">
                <span>Size</span>
              <input id="imageScale" type="range" min="45" max="520" step="1" value="100" aria-label="이미지 확대 축소" />
              </label>
              <button id="imageFrame" class="image-frame" type="button" aria-label="이미지 프레임 조정"></button>
              <div class="tool-control-stack image-control-stack">
                <button id="applyPhoto" class="primary-button" type="button" disabled hidden>적용</button>
                <button id="applyImagePattern" class="secondary-button" type="button" disabled hidden>이미지 패턴</button>
                <div class="image-remote" aria-label="이미지 위치 조정">
                  <span></span>
                  <button id="imageMoveUp" class="secondary-button" type="button">↑</button>
                  <label class="file-button image-upload-button" aria-label="이미지 선택">
                    <input id="photoInput" type="file" accept="image/*" />
                    <span class="image-upload-icon" aria-hidden="true"></span>
                  </label>
                  <button id="imageMoveLeft" class="secondary-button" type="button">‹</button>
                  <button id="imageCenter" class="secondary-button" type="button">•</button>
                  <button id="imageMoveRight" class="secondary-button" type="button">›</button>
                  <span></span>
                  <button id="imageMoveDown" class="secondary-button" type="button">↓</button>
                  <span></span>
                </div>
              </div>
            </div>

            <div class="eraser-panel tool-panel" aria-label="지우개 도구">
              <label class="vertical-zoom eraser-zoom-control">
                <span>Zoom</span>
                <input id="eraserZoom" type="range" min="0.8" max="3.6" step="0.1" value="1" aria-label="지우개 줌" />
              </label>
              <div class="eraser-canvas-stage">
                <canvas id="eraserCanvas" width="220" height="220" aria-label="지우개 작업 영역"></canvas>
              </div>
              <div class="tool-control-stack eraser-control-stack">
                <label class="eraser-size compact-control">
                  크기
                  <input id="eraserSize" type="range" min="12" max="72" step="6" value="30" />
                </label>
                <details class="inline-picker eraser-shape-picker">
                  <summary>
                    <span>모양</span>
                    <strong id="eraserShapeValue">원</strong>
                  </summary>
                  <div class="shape-row" aria-label="지우개 모양 선택">
                    <button class="shape-button is-active" type="button" data-eraser-shape="circle">○</button>
                    <button class="shape-button" type="button" data-eraser-shape="square">□</button>
                    <button class="shape-button" type="button" data-eraser-shape="diamond">◇</button>
                  </div>
                </details>
                <span class="eraser-chip">
                  <span class="eraser-mark" aria-hidden="true"></span>
                  지우개
                </span>
              </div>
            </div>
          </div>

          <div class="view-panel" aria-label="실시간 뷰">
            <button id="undoTool" class="secondary-button view-icon-button" type="button" aria-label="이전">↶</button>
            <button id="redoTool" class="secondary-button view-icon-button" type="button" aria-label="이후">↷</button>
            <div class="viewer-stage">
              <button id="cellWorkspace" class="cell-workspace" type="button" aria-label="현재 칸 디자인"></button>
              <div id="dotViewportControl" class="viewport-control" aria-label="도트 위치 스케일">
                <div id="dotViewportPad" class="viewport-pad" role="slider" aria-label="도트 캔버스 위치 조정" tabindex="0">
                  <span id="dotViewportFocus" class="viewport-focus"></span>
                </div>
              </div>
            </div>
            <button id="resetTool" class="secondary-button view-text-button" type="button">리셋</button>
            <button id="applyTool" class="primary-button view-text-button" type="button">저장</button>
          </div>
        </section>

        <section class="block-slot-panel" aria-label="블록 슬롯">
          <div class="compact-head">
            <span>블록 슬롯</span>
            <div class="head-actions">
              <button id="deleteDesign" class="secondary-button" type="button">삭제</button>
            </div>
          </div>
          <div id="designSlots" class="design-slots" aria-label="저장된 블록 디자인"></div>
        </section>

        <section class="simulation-panel" aria-label="시뮬레이션">
          <div class="compact-head">
            <span>시뮬레이션</span>
            <button id="refreshSimulation" class="secondary-button simulation-refresh" type="button" aria-label="시뮬레이션 새로고침">↻</button>
          </div>
          <div id="simulationTrack" class="simulation-track" aria-label="블록 형태 미리보기"></div>
        </section>

        <div id="editorGrid" class="editor-grid" aria-label="선택 블록 편집" hidden></div>

        <section class="theme-panel" aria-label="테마 관리">
          <button id="loadTheme" class="secondary-button" type="button">불러오기</button>
          <button id="savePack" class="primary-button" type="button">저장하기</button>
        </section>
      </section>
    </main>

    <div id="dragGhost" class="drag-ghost" hidden></div>
    <div id="simulationPreview" class="simulation-preview" hidden>
      <button id="simulationPreviewClose" class="simulation-preview-close" type="button" aria-label="시뮬레이션 닫기">×</button>
      <button id="simulationPreviewCard" class="simulation-preview-card" type="button" aria-label="확대 시뮬레이션 닫기"></button>
    </div>
    <div id="themeDialog" class="theme-dialog" hidden>
      <div class="theme-dialog-card" role="dialog" aria-modal="true" aria-labelledby="themeDialogTitle">
        <strong id="themeDialogTitle"></strong>
        <div id="themeDialogBody" class="theme-dialog-body"></div>
        <div id="themeDialogActions" class="theme-dialog-actions"></div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
